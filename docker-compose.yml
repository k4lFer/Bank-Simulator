version: "3.8"

# ─── Shared config anchors ──────────────────────────────
x-service-base: &service-base
  restart: unless-stopped
  depends_on:
    mysql:
      condition: service_healthy
    kafka:
      condition: service_started

x-service-env: &service-env
  DB_USERNAME: ${DB_USERNAME:-root}
  DB_PASSWORD: ${DB_PASSWORD:-rootpass}
  SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_DDL_AUTO:-update}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
  SPRING_DOCKER_COMPOSE_ENABLED: ${DOCKER_COMPOSE_ENABLED:-false}

services:
  # ─── Data Layer ────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: bank-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./.docker/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ─── Messaging ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: bank-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: bank-kafka
    ports:
      - "9093:9092"
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bank-kafka-ui
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ─── Microservices ─────────────────────────────────────
  users-service:
    <<: *service-base
    build:
      context: .
      dockerfile: users-service/Dockerfile
    container_name: bank-users
    ports:
      - "8081:8081"
    env_file: ./users-service/.env
    environment:
      <<: *service-env
      SERVER_PORT: 8081
    mem_limit: 512m
    cpus: 0.5

  accounts-service:
    <<: *service-base
    build:
      context: .
      dockerfile: accounts-service/Dockerfile
    container_name: bank-accounts
    ports:
      - "8082:8082"
    env_file: ./accounts-service/.env
    environment:
      <<: *service-env
      SERVER_PORT: 8082
    mem_limit: 512m
    cpus: 0.5

  transfers-service:
    <<: *service-base
    build:
      context: .
      dockerfile: transfers-service/Dockerfile
    container_name: bank-transfers
    ports:
      - "8083:8083"
    env_file: ./transfers-service/.env
    environment:
      <<: *service-env
      SERVER_PORT: 8083
    mem_limit: 512m
    cpus: 0.5

  ledger-service:
    <<: *service-base
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    container_name: bank-ledger
    ports:
      - "8084:8084"
    env_file: ./ledger-service/.env
    environment:
      <<: *service-env
      SERVER_PORT: 8084
    mem_limit: 512m
    cpus: 0.5

  notifications-service:
    <<: *service-base
    build:
      context: .
      dockerfile: notifications-service/Dockerfile
    container_name: bank-notifications
    ports:
      - "8085:8085"
    env_file: ./notifications-service/.env
    environment:
      <<: *service-env
      SERVER_PORT: 8085
    mem_limit: 512m
    cpus: 0.5

  api-gateway:
    <<: *service-base
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: bank-gateway
    expose:
      - 8000
    env_file: ./api-gateway/.env
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: ${DOCKER_COMPOSE_ENABLED:-false}
      SERVER_PORT: 8000
    mem_limit: 256m
    cpus: 0.25

  # ─── Frontend (dev with HMR) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: bank-frontend
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api-gateway:8000}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/package.json:/app/package.json
      - ./frontend/bun.lock:/app/bun.lock
      - ./frontend/public:/app/public
      - ./frontend/eslint.config.js:/app/eslint.config.js
    restart: unless-stopped

  # ─── Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bank-nginx
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped
    depends_on:
      - api-gateway
      - frontend

volumes:
  mysql_data:
