spring:
  application:
    name: transfers-service

  datasource:
    url: ${TRANSFERS_DATASOURCE_URL:jdbc:mysql://localhost:3307/bank_transfers?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 5000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: transfers-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.pck4x.sharedcontracts.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.metrics.push: false

  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}

server:
  port: 8083
  tomcat:
    threads:
      max: 50
      min-spare: 5
    accept-count: 50
    connection-timeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGJhbmsgc2ltdWxhdG9yIGRlbW8gcHVycG9zZXMgb25seQo=}

springdoc:
  servers:
    - url: http://localhost:8000
      description: Bank Simulator API Gateway
